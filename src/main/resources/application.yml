spring:
  application:
    name: terranga
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8099

api:
  api-football:
    base-url: https://v3.football.api-sports.io/
    header:
      key: x-apisports-key
      value: 8d9aab264ad0499f3243f6e1050e94a1
    id:
      Senegal-team: 13
